services:
  # Curriculum microservice (internal)
  curriculum:
    build:
      context: .
      dockerfile: services/curriculum/Dockerfile
    container_name: youspeak_curriculum
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://youspeak_user:youspeak_password@postgres:5432/youspeak_db
      - AWS_REGION=us-east-1
      - BEDROCK_MODEL_ID=amazon.nova-lite-v1:0
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=5)\" || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 60s
    networks:
      - youspeak_network
    restart: unless-stopped

  # FastAPI Application (core API)
  api:
    build:
      context: .
      target: runtime
      cache_from:
        - type=gha
      cache_to:
        - type=gha,mode=max
    container_name: youspeak_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://youspeak_user:youspeak_password@postgres:5432/youspeak_db
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=development
      - DEBUG=True
      - SECRET_KEY=dev-secret-key-change-in-production-min-32-characters-long
      - CURRICULUM_SERVICE_URL=http://curriculum:8001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      curriculum:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)\" || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 90s
    volumes:
      - ./app:/app/app
    networks:
      - youspeak_network
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: youspeak_postgres
    environment:
      - POSTGRES_USER=youspeak_user
      - POSTGRES_PASSWORD=youspeak_password
      - POSTGRES_DB=youspeak_db
    ports:
      - "5455:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - youspeak_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U youspeak_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: youspeak_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - youspeak_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Adminer for database management (optional)
  adminer:
    image: adminer:latest
    container_name: youspeak_adminer
    ports:
      - "8080:8080"
    networks:
      - youspeak_network
    restart: unless-stopped

  # CI test runner (run after compose up: docker compose run test)
  test:
    build:
      context: .
      target: test
      cache_from:
        - type=gha
      cache_to:
        - type=gha,mode=max
    container_name: youspeak_test
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://youspeak_user:youspeak_password@postgres:5432/youspeak_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=test-secret-key-for-ci-pipeline-min-32-chars
      - ENVIRONMENT=test
      - TEST_USE_LIVE_SERVER=true
      # From test container, API is reachable by service name (not localhost)
      - LIVE_SERVER_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - youspeak_network
    # Run with: docker compose run test
    # Or pytest only: docker compose run test pytest tests/ -v --tb=short

networks:
  youspeak_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
