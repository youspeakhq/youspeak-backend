        id: register-arena-worker-task
        run: |
          TASK_DEF_FILE="${{ steps.task-def-arena-worker.outputs.task-definition }}"
          [[ "$TASK_DEF_FILE" != /* ]] && TASK_DEF_FILE="$GITHUB_WORKSPACE/$TASK_DEF_FILE"
          TASK_ARN=$(aws ecs register-task-definition --cli-input-json "file://$TASK_DEF_FILE" --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "task-definition-arn=$TASK_ARN" >> $GITHUB_OUTPUT

      - name: Deploy arena worker service (production)
        if: needs.build-and-push.outputs.arena_built == 'true'
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE_ARENA }}-worker-production \
            --task-definition ${{ steps.register-arena-worker-task.outputs.task-definition-arn }} \
            --force-new-deployment \
            --no-cli-pager

          # Custom waiter with exponential backoff (max 15 min)
          CLUSTER="${{ env.ECS_CLUSTER }}"
          SERVICE="${{ env.ECS_SERVICE_ARENA }}-production"
          WAIT=5
          MAX_WAIT=60
          TOTAL=0
          TIMEOUT=900
          echo "Waiting for arena service to stabilize..."
          while [ $TOTAL -lt $TIMEOUT ]; do
            DEPLOYMENTS=$(aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" \
              --query 'services[0].deployments | length(@)' --output text)
            PRIMARY_RUNNING=$(aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" \
              --query 'services[0].deployments[?status==`PRIMARY`].runningCount | [0]' --output text)
            PRIMARY_DESIRED=$(aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" \
              --query 'services[0].deployments[?status==`PRIMARY`].desiredCount | [0]' --output text)

            echo "[${TOTAL}s] deployments=$DEPLOYMENTS primary_running=$PRIMARY_RUNNING/$PRIMARY_DESIRED"

            if [ "$DEPLOYMENTS" = "1" ] && [ "$PRIMARY_RUNNING" = "$PRIMARY_DESIRED" ] && [ "$PRIMARY_RUNNING" != "0" ]; then
              echo "Arena service stable after ${TOTAL}s"
              exit 0
            fi

            sleep $WAIT
            TOTAL=$((TOTAL + WAIT))
            WAIT=$((WAIT * 2 > MAX_WAIT ? MAX_WAIT : WAIT * 2))
          done

          echo "::error::Arena service did not stabilize within ${TIMEOUT}s"
          exit 1

      - name: Notify deployment
        if: success()
        run: |
          echo "Production deployment successful!"
          # Add Slack/Discord notification here if needed
