# Branch → deployment:
#   main → staging (core API + curriculum + arena)
#   live → production (core API + curriculum + arena)
# Only changed services are built and deployed (path-based).
name: CI/CD Pipeline

on:
  push:
    branches: [main, live]
  pull_request:
    branches: [main, live]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AWS_REGION: us-east-1
  ECR_REPOSITORY: youspeak-backend
  ECR_REPOSITORY_CURRICULUM: youspeak-curriculum-backend
  ECS_SERVICE: youspeak-api-service
  ECS_SERVICE_CURRICULUM: youspeak-curriculum-service
  ECS_CLUSTER: youspeak-cluster
  ECS_TASK_DEFINITION: .aws/task-definition.json
  ECS_TASK_DEFINITION_STAGING: .aws/task-definition-staging.json
  ECS_TASK_DEFINITION_CURRICULUM: .aws/task-definition-curriculum.json
  CONTAINER_NAME: youspeak-api
  CONTAINER_NAME_CURRICULUM: youspeak-curriculum
  CONTAINER_NAME_ARENA: youspeak-arena
  ECR_REPOSITORY_ARENA: youspeak-arena-backend
  ECS_SERVICE_ARENA: youspeak-arena-service
  ECS_TASK_DEFINITION_ARENA: .aws/task-definition-arena.json

jobs:
  paths:
    name: Paths changed
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.filter.outputs.core }}
      curriculum: ${{ steps.filter.outputs.curriculum }}
      arena: ${{ steps.filter.outputs.arena }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            core:
              - 'app/**'
              - 'alembic/**'
              - 'tests/**'
              - 'requirements.txt'
              - 'requirements-*.txt'
              - 'Dockerfile'
              - '.aws/task-definition.json'
              - '.aws/task-definition-migration.json'
              - '.github/**'
            curriculum:
              - 'services/curriculum/**'
              - '.github/workflows/ci-cd.yml'
            arena:
              - 'services/arena/**'
              - '.github/workflows/ci-cd.yml'

  test:
    name: Run Tests (core)
    runs-on: ubuntu-latest
    needs: paths
    # Run on PRs or when core, curriculum, or arena changed
    if: needs.paths.outputs.core == 'true' || needs.paths.outputs.curriculum == 'true' || needs.paths.outputs.arena == 'true' || github.event_name == 'pull_request'
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run linting
        run: |
          flake8 app --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 app --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci-pipeline-min-32-chars
          ENVIRONMENT: test
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          alembic upgrade head

      - name: Verify schema (users.language_id)
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
        run: |
          python -c "
          import os
          from sqlalchemy import create_engine, text
          url = os.environ.get('DATABASE_URL', '')
          if url.startswith('postgresql+asyncpg'):
              url = url.replace('postgresql+asyncpg://', 'postgresql://', 1)
          e = create_engine(url)
          with e.connect() as c:
              r = c.execute(text(\"SELECT 1 FROM information_schema.columns WHERE table_schema='public' AND table_name='users' AND column_name='language_id'\"))
              row = r.fetchone()
          assert row is not None, 'Schema check failed: users.language_id missing. Ensure alembic merge is applied and upgrade head runs both branches.'
          print('Schema OK: users.language_id present')
          "

      - name: Start curriculum service (for proxy tests)
        if: needs.paths.outputs.core == 'true' || needs.paths.outputs.curriculum == 'true'
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
          AWS_REGION: us-east-1
          BEDROCK_MODEL_ID: amazon.nova-lite-v1:0
        run: |
          pip install -r services/curriculum/requirements.txt
          (cd services/curriculum && DATABASE_URL="$DATABASE_URL" AWS_REGION="$AWS_REGION" BEDROCK_MODEL_ID="$BEDROCK_MODEL_ID" python3 -m uvicorn main:app --host 0.0.0.0 --port 8001) &

      - name: Start arena service
        if: needs.paths.outputs.core == 'true' || needs.paths.outputs.arena == 'true'
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci-pipeline-min-32-chars
          INTERNAL_API_SECRET: test-internal-secret
          CORE_SERVICE_URL: http://localhost:8000
        run: |
          pip install -r services/arena/requirements.txt
          REDIS_URL="$REDIS_URL" INTERNAL_API_SECRET="$INTERNAL_API_SECRET" CORE_SERVICE_URL="$CORE_SERVICE_URL" DATABASE_URL="$DATABASE_URL" SECRET_KEY="$SECRET_KEY" python3 -m uvicorn services.arena.main:app --host 0.0.0.0 --port 8002 &

      - name: Start API server
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci-pipeline-min-32-chars
          ENVIRONMENT: test
          CURRICULUM_SERVICE_URL: http://localhost:8001
          RESEND_API_KEY: test_resend_key_for_ci
          EMAIL_FROM: "YouSpeak <noreply@youspeakhq.com>"
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for curriculum service..."
          timeout 30 bash -c 'until curl -sf http://localhost:8001/health >/dev/null 2>&1; do sleep 0.3; done' || (echo "Curriculum service failed to start"; exit 1)
          echo "Curriculum service healthy"

          echo "Waiting for API service..."
          timeout 30 bash -c 'until curl -sf http://localhost:8000/health >/dev/null 2>&1; do sleep 0.3; done' || (echo "API failed to start"; exit 1)
          echo "API service healthy"

          echo "Waiting for arena service..."
          timeout 30 bash -c 'until curl -sf http://localhost:8002/health >/dev/null 2>&1; do sleep 0.3; done' || (echo "Arena service failed to start"; exit 1)
          echo "Arena service healthy"

      - name: Restore testmon cache
        uses: actions/cache@v5
        with:
          path: .testmondata
          key: testmon-${{ github.ref_name }}-${{ hashFiles('app/**', 'tests/**') }}
          restore-keys: |
            testmon-${{ github.ref_name }}-
            testmon-main-

      - name: Run tests (core)
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci-pipeline-min-32-chars
          ENVIRONMENT: test
          TEST_USE_LIVE_SERVER: "true"
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          RUN_LIVE_E2E: ${{ secrets.RUN_LIVE_E2E }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          pip install respx
          pytest tests/ -v --tb=long -n 4 --testmon --cov=app --cov-report=xml --cov-report=term

      - name: Run tests (arena)
        if: needs.paths.outputs.arena == 'true' || github.event_name == 'pull_request'
        env:
          REDIS_URL: redis://localhost:6379/0
          INTERNAL_API_SECRET: test-internal-secret
          CORE_SERVICE_URL: http://localhost:8000
          LIVE_SERVER_URL: http://localhost:8002
          TEST_USE_LIVE_SERVER: "true"
        run: |
          PYTHONPATH=$PYTHONPATH:$(pwd)/services/arena pytest services/arena/tests/ -v --tb=long

      - name: Run tests (curriculum)
        if: needs.paths.outputs.curriculum == 'true' || github.event_name == 'pull_request'
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
          LIVE_SERVER_URL: http://localhost:8001
          TEST_USE_LIVE_SERVER: "true"
        run: |
          PYTHONPATH=$PYTHONPATH:$(pwd)/services/curriculum pytest services/curriculum/tests/ -v --tb=long

      - name: Upload coverage reports
        uses: codecov/codecov-action@v6
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  docker-smoke:
    name: Docker Smoke Tests
    runs-on: ubuntu-latest
    # Only run on PRs — pushes to main/live build the real Docker image in build-and-push
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          docker-images: "false"
          tool-cache: "true"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create .env for Docker Compose
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          cp .env.example .env
          # Append R2 (and optional) vars from secrets so api/test containers can run R2-dependent tests
          { [ -n "$R2_ACCOUNT_ID" ] && echo "R2_ACCOUNT_ID=$R2_ACCOUNT_ID"; [ -n "$R2_ACCESS_KEY_ID" ] && echo "R2_ACCESS_KEY_ID=$R2_ACCESS_KEY_ID"; [ -n "$R2_SECRET_ACCESS_KEY" ] && echo "R2_SECRET_ACCESS_KEY=$R2_SECRET_ACCESS_KEY"; } >> .env || true

      - name: Start Docker Compose
        id: compose
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d --build

      - name: Dump API logs on failure
        if: failure() && steps.compose.outcome == 'failure'
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml logs api || true
          docker compose -f docker-compose.yml -f docker-compose.ci.yml ps -a || true

      - name: Wait for API health
        run: |
          for i in $(seq 1 60); do
            curl -sf http://localhost:8000/health >/dev/null && break
            sleep 2
          done
          curl -sf http://localhost:8000/health || (echo "API not healthy"; docker compose -f docker-compose.yml -f docker-compose.ci.yml logs api; exit 1)

      - name: Smoke test API
        run: |
          curl -sf http://localhost:8000/docs >/dev/null && echo "Docs OK"
          curl -sf http://localhost:8000/api/v1/health 2>/dev/null || curl -sf http://localhost:8000/health >/dev/null && echo "Health OK"

      - name: Verify linting in container
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml run --rm test sh -c "flake8 app --count --select=E9,F63,F7,F82 --show-source --statistics"

      - name: Verify migrations in container
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml run --rm test sh -c "alembic upgrade head"

      - name: Stop Docker Compose
        if: always()
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v

  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: [paths, test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/live') && (needs.test.result == 'success' || needs.test.result == 'skipped')
    permissions:
      contents: read
      security-events: write
    outputs:
      image: ${{ steps.image-output.outputs.image }}
      migration_image: ${{ steps.image-output.outputs.migration_image }}
      curriculum_image: ${{ steps.curriculum-image.outputs.curriculum_image }}
      core_built: ${{ steps.image-output.outputs.core_built }}
      curriculum_built: ${{ steps.curriculum-image.outputs.curriculum_built }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          docker-images: "false"
          tool-cache: "true"
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Validate task definition
        if: needs.paths.outputs.core == 'true'
        run: |
          if grep -q 'YOUR_ACCOUNT_ID' .aws/task-definition.json 2>/dev/null; then
            echo "::error::.aws/task-definition.json contains YOUR_ACCOUNT_ID. Run ./.aws/generate-task-definition.sh locally (after terraform apply) and commit the file."
            exit 1
          fi
          echo "Task definition OK"
      - name: Build and push core + migration images (parallel via bake)
        if: needs.paths.outputs.core == 'true'
        uses: docker/bake-action@v7
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
          CACHE_REPO: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}
        with:
          files: docker-bake.hcl
          push: true
      - name: Build and push curriculum image to Amazon ECR
        if: needs.paths.outputs.curriculum == 'true'
        id: build-curriculum-image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./services/curriculum/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_CURRICULUM }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_CURRICULUM }}:latest
      - name: Build and push arena image to Amazon ECR
        if: needs.paths.outputs.arena == 'true'
        id: build-arena-image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./services/arena/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_ARENA }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_ARENA }}:latest
      - name: Set image outputs
        id: image-output
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          CORE_BUILT: ${{ needs.paths.outputs.core }}
        run: |
          echo "core_built=$CORE_BUILT" >> $GITHUB_OUTPUT
          if [ "$CORE_BUILT" = "true" ]; then
            echo "image=$REGISTRY/${{ env.ECR_REPOSITORY }}:${{ github.sha }}" >> $GITHUB_OUTPUT
            echo "migration_image=$REGISTRY/${{ env.ECR_REPOSITORY }}:migration" >> $GITHUB_OUTPUT
          fi
      - name: Set curriculum image output
        id: curriculum-image
        run: |
          echo "curriculum_image=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_CURRICULUM }}:${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "curriculum_built=${{ needs.paths.outputs.curriculum }}" >> $GITHUB_OUTPUT
      - name: Set arena image output
        id: arena-image
        run: |
          echo "arena_image=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_ARENA }}:${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "arena_built=${{ needs.paths.outputs.arena }}" >> $GITHUB_OUTPUT
      - name: Scan core image for vulnerabilities
        if: success() && needs.paths.outputs.core == 'true'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
      - name: Upload Trivy scan results to GitHub Security
        if: success() && needs.paths.outputs.core == 'true' && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  deploy-staging:
    name: Deploy to Staging API (ECS)
    runs-on: ubuntu-latest
    needs: [paths, build-and-push]
    if: github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: ${{ vars.STAGING_API_URL }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Generate staging task definition
        if: needs.build-and-push.outputs.core_built == 'true'
        run: |
          if [ -z "${{ vars.CURRICULUM_SERVICE_URL_STAGING }}" ]; then
            echo "::error::vars.CURRICULUM_SERVICE_URL_STAGING is not set. Set it from: cd terraform && terraform output -raw curriculum_service_url_staging"
            exit 1
          fi
          jq --arg url "${{ vars.CURRICULUM_SERVICE_URL_STAGING }}" '
            .containerDefinitions[0].environment |= (
              (map(if .name == "ENVIRONMENT" then .value = "staging" elif .name == "CURRICULUM_SERVICE_URL" then .value = $url else . end)) as $e |
              if ($e | any(.name == "CURRICULUM_SERVICE_URL")) then $e else ($e + [{name: "CURRICULUM_SERVICE_URL", value: $url}]) end
            )
          ' .aws/task-definition.json > .aws/task-definition-staging.json
      - name: Fill in the new image ID in the Amazon ECS task definition (staging)
        if: needs.build-and-push.outputs.core_built == 'true'
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.ECS_TASK_DEFINITION_STAGING }}
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ needs.build-and-push.outputs.image }}
      - name: Register task definition
        if: needs.build-and-push.outputs.core_built == 'true'
        id: register-task
        run: |
          TASK_DEF_FILE="${{ steps.task-def.outputs.task-definition }}"
          [[ "$TASK_DEF_FILE" != /* ]] && TASK_DEF_FILE="$GITHUB_WORKSPACE/$TASK_DEF_FILE"
          TASK_ARN=$(aws ecs register-task-definition --cli-input-json "file://$TASK_DEF_FILE" --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "task-definition-arn=$TASK_ARN" >> $GITHUB_OUTPUT
      - name: Fill in migration image in migration task definition
        if: needs.build-and-push.outputs.core_built == 'true'
        id: task-def-migration
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: .aws/task-definition-migration.json
          container-name: youspeak-migration
          image: ${{ needs.build-and-push.outputs.migration_image }}
      - name: Register migration task definition
        if: needs.build-and-push.outputs.core_built == 'true'
        id: register-migration-task
        run: |
          TASK_DEF_FILE="${{ steps.task-def-migration.outputs.task-definition }}"
          [[ "$TASK_DEF_FILE" != /* ]] && TASK_DEF_FILE="$GITHUB_WORKSPACE/$TASK_DEF_FILE"
          TASK_ARN=$(aws ecs register-task-definition --cli-input-json "file://$TASK_DEF_FILE" --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "task-definition-arn=$TASK_ARN" >> $GITHUB_OUTPUT
      - name: Run database migrations (one-off task)
        if: needs.build-and-push.outputs.core_built == 'true'
        env:
          PRIVATE_SUBNET_IDS: ${{ secrets.PRIVATE_SUBNET_IDS }}
          ECS_SECURITY_GROUP: ${{ secrets.ECS_SECURITY_GROUP }}
        run: |
          set -e
          CLUSTER="${{ env.ECS_CLUSTER }}"
          SERVICE="${{ env.ECS_SERVICE }}-staging"
          TASK_DEF="${{ steps.register-migration-task.outputs.task-definition-arn }}"
          # Prefer network config from the staging service; require non-empty securityGroups (RDS allows only ECS SG)
          NET_JSON=$(aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" --query 'services[0].networkConfiguration.awsvpcConfiguration' --output json 2>/dev/null || true)
          SG_COUNT=$(echo "$NET_JSON" | jq '.securityGroups | length' 2>/dev/null || echo "0")
          if [ -z "$NET_JSON" ] || [ "$NET_JSON" = "null" ] || ! echo "$NET_JSON" | grep -q subnets || [ "$SG_COUNT" = "0" ] || [ "$SG_COUNT" = "null" ]; then
            if [ -z "$PRIVATE_SUBNET_IDS" ] || [ -z "$ECS_SECURITY_GROUP" ]; then
              echo "::warning::PRIVATE_SUBNET_IDS or ECS_SECURITY_GROUP not set and could not get valid config from service (securityGroups must be non-empty). Skipping migrations (run .aws/set-github-secrets.sh)."
              exit 0
            fi
            # Build JSON from secrets (trim spaces; subnets comma-separated)
            SUBNETS_JSON=$(echo "$PRIVATE_SUBNET_IDS" | tr ',' '\n' | sed 's/^ *//;s/ *$//' | jq -R -s -c 'split("\n") | map(select(length > 0))')
            NET_JSON=$(jq -n --argjson subnets "$SUBNETS_JSON" --arg sg "$ECS_SECURITY_GROUP" '{subnets: $subnets, securityGroups: [$sg], assignPublicIp: "DISABLED"}')
          else
            NET_JSON=$(echo "$NET_JSON" | jq '. + {assignPublicIp: "DISABLED"}')
          fi
          # Final check: migration task must have at least one security group to reach RDS
          if [ "$(echo "$NET_JSON" | jq '.securityGroups | length')" = "0" ]; then
            echo "::error::Migration task requires a security group (RDS allows only ECS SG). Set GitHub secret ECS_SECURITY_GROUP from: cd terraform && terraform output -raw ecs_security_group_id"
            exit 1
          fi
          echo "Using network config: $NET_JSON"
          TASK_ARN=$(aws ecs run-task \
            --cluster "$CLUSTER" \
            --task-definition "$TASK_DEF" \
            --launch-type FARGATE \
            --network-configuration "{\"awsvpcConfiguration\": $NET_JSON}" \
            --overrides '{"containerOverrides":[{"name":"youspeak-migration","command":["python","-m","alembic","upgrade","head"]}]}' \
            --query 'tasks[0].taskArn' --output text)
          aws ecs wait tasks-stopped --cluster "$CLUSTER" --tasks "$TASK_ARN"
          EXIT_CODE=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK_ARN" --query 'tasks[0].containers[0].exitCode' --output text)
          ( [ -z "$EXIT_CODE" ] || [ "$EXIT_CODE" = "None" ] ) && EXIT_CODE="null"
          if [ "$EXIT_CODE" != "0" ]; then
            echo "::error::Migration task exited with code $EXIT_CODE"
            STOPPED_REASON=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK_ARN" --query 'tasks[0].stoppedReason' --output text 2>/dev/null || true)
            CONTAINER_REASON=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK_ARN" --query 'tasks[0].containers[0].reason' --output text 2>/dev/null || true)
            echo "Task stoppedReason: $STOPPED_REASON"
            echo "Container reason: $CONTAINER_REASON"
            aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK_ARN" --query 'tasks[0].containers[0]' --output json
            TASK_ID=$(echo "$TASK_ARN" | awk -F/ '{print $NF}')
            echo "--- Waiting 20s for CloudWatch logs, then fetching (stream: ecs/youspeak-migration/$TASK_ID) ---"
            sleep 20
            aws logs get-log-events --log-group-name "/ecs/youspeak-api" --log-stream-name "ecs/youspeak-migration/$TASK_ID" --limit 100 --query 'events[*].message' --output text 2>&1 || true
            exit 1
          fi
          echo "Migrations completed successfully"
      - name: Deploy core Amazon ECS task definition
        if: needs.build-and-push.outputs.core_built == 'true'
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }}-staging \
            --task-definition ${{ steps.register-task.outputs.task-definition-arn }} \
            --force-new-deployment \
            --no-cli-pager

          # Custom waiter with exponential backoff (max 15 min)
          CLUSTER="${{ env.ECS_CLUSTER }}"
          SERVICE="${{ env.ECS_SERVICE }}-staging"
          WAIT=5
          MAX_WAIT=60
          TOTAL=0
          TIMEOUT=900
          echo "Waiting for service to stabilize..."
          while [ $TOTAL -lt $TIMEOUT ]; do
            DEPLOYMENTS=$(aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" \
              --query 'services[0].deployments | length(@)' --output text)
            PRIMARY_RUNNING=$(aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" \
              --query 'services[0].deployments[?status==`PRIMARY`].runningCount | [0]' --output text)
            PRIMARY_DESIRED=$(aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" \
              --query 'services[0].deployments[?status==`PRIMARY`].desiredCount | [0]' --output text)

            echo "[${TOTAL}s] deployments=$DEPLOYMENTS primary_running=$PRIMARY_RUNNING/$PRIMARY_DESIRED"

            if [ "$DEPLOYMENTS" = "1" ] && [ "$PRIMARY_RUNNING" = "$PRIMARY_DESIRED" ] && [ "$PRIMARY_RUNNING" != "0" ]; then
              echo "Service stable after ${TOTAL}s"
              exit 0
            fi

            sleep $WAIT
            TOTAL=$((TOTAL + WAIT))
            WAIT=$((WAIT * 2 > MAX_WAIT ? MAX_WAIT : WAIT * 2))
          done

          echo "::error::Service did not stabilize within ${TIMEOUT}s"
          aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" \
            --query 'services[0].deployments' --output json
          exit 1
      # Staging curriculum uses Terraform-managed task def (youspeak-curriculum-task-tf) with env-specific secrets; only force new deployment to pull new image.
      - name: Deploy curriculum ECS service (staging)
        if: needs.build-and-push.outputs.curriculum_built == 'true'
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE_CURRICULUM }}-staging \
            --force-new-deployment \
            --no-cli-pager

          # Custom waiter with exponential backoff (max 15 min)
          CLUSTER="${{ env.ECS_CLUSTER }}"
          SERVICE="${{ env.ECS_SERVICE_CURRICULUM }}-staging"
          WAIT=5
          MAX_WAIT=60
          TOTAL=0
          TIMEOUT=900
          echo "Waiting for curriculum service to stabilize..."
          while [ $TOTAL -lt $TIMEOUT ]; do
            DEPLOYMENTS=$(aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" \
              --query 'services[0].deployments | length(@)' --output text)
            PRIMARY_RUNNING=$(aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" \
              --query 'services[0].deployments[?status==`PRIMARY`].runningCount | [0]' --output text)
            PRIMARY_DESIRED=$(aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" \
              --query 'services[0].deployments[?status==`PRIMARY`].desiredCount | [0]' --output text)

            echo "[${TOTAL}s] deployments=$DEPLOYMENTS primary_running=$PRIMARY_RUNNING/$PRIMARY_DESIRED"

            if [ "$DEPLOYMENTS" = "1" ] && [ "$PRIMARY_RUNNING" = "$PRIMARY_DESIRED" ] && [ "$PRIMARY_RUNNING" != "0" ]; then
              echo "Curriculum service stable after ${TOTAL}s"
              exit 0
            fi

            sleep $WAIT
            TOTAL=$((TOTAL + WAIT))
            WAIT=$((WAIT * 2 > MAX_WAIT ? MAX_WAIT : WAIT * 2))
          done

          echo "::error::Curriculum service did not stabilize within ${TIMEOUT}s"
          exit 1
      - name: Generate staging arena task definition
        if: needs.build-and-push.outputs.arena_built == 'true'
        run: |
          if [ -z "${{ vars.STAGING_API_URL }}" ]; then
            echo "::error::vars.STAGING_API_URL is not set."
            exit 1
          fi
          jq --arg url "${{ vars.STAGING_API_URL }}" '
            .containerDefinitions[0].environment |= (
              (map(if .name == "ENVIRONMENT" then .value = "staging" elif .name == "CORE_SERVICE_URL" then .value = $url else . end)) as $e |
              if ($e | any(.name == "CORE_SERVICE_URL")) then $e else ($e + [{name: "CORE_SERVICE_URL", value: $url}]) end
            )
          ' .aws/task-definition-arena.json > .aws/task-definition-arena-staging.json
      - name: Fill in arena image in arena task definition (staging)
        if: needs.build-and-push.outputs.arena_built == 'true'
        id: task-def-arena-staging
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: .aws/task-definition-arena-staging.json
          container-name: ${{ env.CONTAINER_NAME_ARENA }}
          image: ${{ needs.build-and-push.outputs.arena_image }}
      - name: Register arena task definition (staging)
        if: needs.build-and-push.outputs.arena_built == 'true'
        id: register-arena-task-staging
        run: |
          TASK_DEF_FILE="${{ steps.task-def-arena-staging.outputs.task-definition }}"
          [[ "$TASK_DEF_FILE" != /* ]] && TASK_DEF_FILE="$GITHUB_WORKSPACE/$TASK_DEF_FILE"
          TASK_ARN=$(aws ecs register-task-definition --cli-input-json "file://$TASK_DEF_FILE" --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "task-definition-arn=$TASK_ARN" >> $GITHUB_OUTPUT
      - name: Deploy arena ECS service (staging)
        if: needs.build-and-push.outputs.arena_built == 'true'
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE_ARENA }}-staging \
            --task-definition ${{ steps.register-arena-task-staging.outputs.task-definition-arn }} \
            --force-new-deployment \
            --no-cli-pager

      - name: Generate staging arena worker task definition
        if: needs.build-and-push.outputs.arena_built == 'true'
        run: |
          jq '
            .containerDefinitions[0].environment |= (
              map(if .name == "SERVICE_ROLE" then .value = "worker" else . end)
            ) |
            del(.containerDefinitions[0].portMappings) |
            del(.containerDefinitions[0].healthCheck)
          ' .aws/task-definition-arena-staging.json > .aws/task-definition-arena-worker-staging.json

      - name: Fill in arena image in worker task definition (staging)
        if: needs.build-and-push.outputs.arena_built == 'true'
        id: task-def-arena-worker-staging
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: .aws/task-definition-arena-worker-staging.json
          container-name: ${{ env.CONTAINER_NAME_ARENA }}
          image: ${{ needs.build-and-push.outputs.arena_image }}

      - name: Register arena worker task definition (staging)
        if: needs.build-and-push.outputs.arena_built == 'true'
        id: register-arena-worker-task-staging
        run: |
          TASK_DEF_FILE="${{ steps.task-def-arena-worker-staging.outputs.task-definition }}"
          [[ "$TASK_DEF_FILE" != /* ]] && TASK_DEF_FILE="$GITHUB_WORKSPACE/$TASK_DEF_FILE"
          TASK_ARN=$(aws ecs register-task-definition --cli-input-json "file://$TASK_DEF_FILE" --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "task-definition-arn=$TASK_ARN" >> $GITHUB_OUTPUT

      - name: Deploy arena worker service (staging)
        if: needs.build-and-push.outputs.arena_built == 'true'
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE_ARENA }}-worker-staging \
            --task-definition ${{ steps.register-arena-worker-task-staging.outputs.task-definition-arn }} \
            --force-new-deployment \
            --no-cli-pager

          # Custom waiter with exponential backoff (max 15 min)
          CLUSTER="${{ env.ECS_CLUSTER }}"
          SERVICE="${{ env.ECS_SERVICE_ARENA }}-staging"
          WAIT=5
          MAX_WAIT=60
          TOTAL=0
          TIMEOUT=900
          echo "Waiting for arena service to stabilize..."
          while [ $TOTAL -lt $TIMEOUT ]; do
            DEPLOYMENTS=$(aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" \
              --query 'services[0].deployments | length(@)' --output text)
            PRIMARY_RUNNING=$(aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" \
              --query 'services[0].deployments[?status==`PRIMARY`].runningCount | [0]' --output text)
            PRIMARY_DESIRED=$(aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" \
              --query 'services[0].deployments[?status==`PRIMARY`].desiredCount | [0]' --output text)

            echo "[${TOTAL}s] deployments=$DEPLOYMENTS primary_running=$PRIMARY_RUNNING/$PRIMARY_DESIRED"

            if [ "$DEPLOYMENTS" = "1" ] && [ "$PRIMARY_RUNNING" = "$PRIMARY_DESIRED" ] && [ "$PRIMARY_RUNNING" != "0" ]; then
              echo "Arena service stable after ${TOTAL}s"
              exit 0
            fi

            sleep $WAIT
            TOTAL=$((TOTAL + WAIT))
            WAIT=$((WAIT * 2 > MAX_WAIT ? MAX_WAIT : WAIT * 2))
          done

          echo "::error::Arena service did not stabilize within ${TIMEOUT}s"
          exit 1

  deploy-live:
    name: Deploy to Live API (ECS)
    runs-on: ubuntu-latest
    needs: [paths, build-and-push]
    if: github.ref == 'refs/heads/live'
    environment:
      name: production
      url: https://api.youspeak.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Fill in the new image ID in the Amazon ECS task definition
        if: needs.build-and-push.outputs.core_built == 'true'
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.ECS_TASK_DEFINITION }}
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ needs.build-and-push.outputs.image }}
          environment-variables: |
            ENVIRONMENT=production
            LOG_LEVEL=WARNING
      - name: Register task definition
        if: needs.build-and-push.outputs.core_built == 'true'
        id: register-task
        run: |
          TASK_DEF_FILE="${{ steps.task-def.outputs.task-definition }}"
          [[ "$TASK_DEF_FILE" != /* ]] && TASK_DEF_FILE="$GITHUB_WORKSPACE/$TASK_DEF_FILE"
          TASK_ARN=$(aws ecs register-task-definition --cli-input-json "file://$TASK_DEF_FILE" --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "task-definition-arn=$TASK_ARN" >> $GITHUB_OUTPUT
      - name: Fill in migration image in migration task definition
        if: needs.build-and-push.outputs.core_built == 'true'
        id: task-def-migration
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: .aws/task-definition-migration.json
          container-name: youspeak-migration
          image: ${{ needs.build-and-push.outputs.migration_image }}
      - name: Register migration task definition
        if: needs.build-and-push.outputs.core_built == 'true'
        id: register-migration-task
        run: |
          TASK_DEF_FILE="${{ steps.task-def-migration.outputs.task-definition }}"
          [[ "$TASK_DEF_FILE" != /* ]] && TASK_DEF_FILE="$GITHUB_WORKSPACE/$TASK_DEF_FILE"
          TASK_ARN=$(aws ecs register-task-definition --cli-input-json "file://$TASK_DEF_FILE" --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "task-definition-arn=$TASK_ARN" >> $GITHUB_OUTPUT
      - name: Run database migrations (one-off task)
        if: needs.build-and-push.outputs.core_built == 'true'
        env:
          PRIVATE_SUBNET_IDS: ${{ secrets.PRIVATE_SUBNET_IDS }}
          ECS_SECURITY_GROUP: ${{ secrets.ECS_SECURITY_GROUP }}
        run: |
          set -e
          CLUSTER="${{ env.ECS_CLUSTER }}"
          SERVICE="${{ env.ECS_SERVICE }}-production"
          TASK_DEF="${{ steps.register-migration-task.outputs.task-definition-arn }}"
          NET_JSON=$(aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" --query 'services[0].networkConfiguration.awsvpcConfiguration' --output json 2>/dev/null || true)
          SG_COUNT=$(echo "$NET_JSON" | jq '.securityGroups | length' 2>/dev/null || echo "0")
          if [ -z "$NET_JSON" ] || [ "$NET_JSON" = "null" ] || ! echo "$NET_JSON" | grep -q subnets || [ "$SG_COUNT" = "0" ] || [ "$SG_COUNT" = "null" ]; then
            if [ -z "$PRIVATE_SUBNET_IDS" ] || [ -z "$ECS_SECURITY_GROUP" ]; then
              echo "::warning::PRIVATE_SUBNET_IDS or ECS_SECURITY_GROUP not set and could not get valid config from service (securityGroups must be non-empty). Skipping migrations (run .aws/set-github-secrets.sh)."
              exit 0
            fi
            SUBNETS_JSON=$(echo "$PRIVATE_SUBNET_IDS" | tr ',' '\n' | sed 's/^ *//;s/ *$//' | jq -R -s -c 'split("\n") | map(select(length > 0))')
            NET_JSON=$(jq -n --argjson subnets "$SUBNETS_JSON" --arg sg "$ECS_SECURITY_GROUP" '{subnets: $subnets, securityGroups: [$sg], assignPublicIp: "DISABLED"}')
          else
            NET_JSON=$(echo "$NET_JSON" | jq '. + {assignPublicIp: "DISABLED"}')
          fi
          if [ "$(echo "$NET_JSON" | jq '.securityGroups | length')" = "0" ]; then
            echo "::error::Migration task requires a security group. Set GitHub secret ECS_SECURITY_GROUP from: cd terraform && terraform output -raw ecs_security_group_id"
            exit 1
          fi
          echo "Using network config: $NET_JSON"
          TASK_ARN=$(aws ecs run-task \
            --cluster "$CLUSTER" \
            --task-definition "$TASK_DEF" \
            --launch-type FARGATE \
            --network-configuration "{\"awsvpcConfiguration\": $NET_JSON}" \
            --overrides '{"containerOverrides":[{"name":"youspeak-migration","command":["python","-m","alembic","upgrade","head"]}]}' \
            --query 'tasks[0].taskArn' --output text)
          aws ecs wait tasks-stopped --cluster "$CLUSTER" --tasks "$TASK_ARN"
          EXIT_CODE=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK_ARN" --query 'tasks[0].containers[0].exitCode' --output text)
          ( [ -z "$EXIT_CODE" ] || [ "$EXIT_CODE" = "None" ] ) && EXIT_CODE="null"
          if [ "$EXIT_CODE" != "0" ]; then
            echo "::error::Migration task exited with code $EXIT_CODE"
            STOPPED_REASON=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK_ARN" --query 'tasks[0].stoppedReason' --output text 2>/dev/null || true)
            CONTAINER_REASON=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK_ARN" --query 'tasks[0].containers[0].reason' --output text 2>/dev/null || true)
            echo "Task stoppedReason: $STOPPED_REASON"
            echo "Container reason: $CONTAINER_REASON"
            aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK_ARN" --query 'tasks[0].containers[0]' --output json
            TASK_ID=$(echo "$TASK_ARN" | awk -F/ '{print $NF}')
            echo "--- Waiting 20s for CloudWatch logs, then fetching (stream: ecs/youspeak-migration/$TASK_ID) ---"
            sleep 20
            aws logs get-log-events --log-group-name "/ecs/youspeak-api" --log-stream-name "ecs/youspeak-migration/$TASK_ID" --limit 100 --query 'events[*].message' --output text 2>&1 || true
            exit 1
          fi
          echo "Migrations completed successfully"
      - name: Deploy core Amazon ECS task definition
        if: needs.build-and-push.outputs.core_built == 'true'
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }}-production \
            --task-definition ${{ steps.register-task.outputs.task-definition-arn }} \
            --force-new-deployment \
            --no-cli-pager

          # Custom waiter with exponential backoff (max 15 min)
          CLUSTER="${{ env.ECS_CLUSTER }}"
          SERVICE="${{ env.ECS_SERVICE }}-production"
          WAIT=5
          MAX_WAIT=60
          TOTAL=0
          TIMEOUT=900
          echo "Waiting for service to stabilize..."
          while [ $TOTAL -lt $TIMEOUT ]; do
            DEPLOYMENTS=$(aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" \
              --query 'services[0].deployments | length(@)' --output text)
            PRIMARY_RUNNING=$(aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" \
              --query 'services[0].deployments[?status==`PRIMARY`].runningCount | [0]' --output text)
            PRIMARY_DESIRED=$(aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" \
              --query 'services[0].deployments[?status==`PRIMARY`].desiredCount | [0]' --output text)

            echo "[${TOTAL}s] deployments=$DEPLOYMENTS primary_running=$PRIMARY_RUNNING/$PRIMARY_DESIRED"

            if [ "$DEPLOYMENTS" = "1" ] && [ "$PRIMARY_RUNNING" = "$PRIMARY_DESIRED" ] && [ "$PRIMARY_RUNNING" != "0" ]; then
              echo "Service stable after ${TOTAL}s"
              exit 0
            fi

            sleep $WAIT
            TOTAL=$((TOTAL + WAIT))
            WAIT=$((WAIT * 2 > MAX_WAIT ? MAX_WAIT : WAIT * 2))
          done

          echo "::error::Service did not stabilize within ${TIMEOUT}s"
          aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" \
            --query 'services[0].deployments' --output json
          exit 1
      - name: Fill in curriculum image in curriculum task definition
