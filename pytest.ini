[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=app
    --cov-report=term-missing
    --cov-report=html
    -n auto
markers =
    asyncio: mark test as async
    integration: integration tests (require DATABASE_URL, SECRET_KEY)
    live: live E2E tests (require RUN_LIVE_E2E, Bedrock/R2)
